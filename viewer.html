<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&family=Noto+Serif+JP:wght@500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --stage-bg: #11182b;
            --navy: #1c2644;
            --navy-alt: #232f55;
            --cream: #f0ece3;
            --cream-alt: #e6e0d4;
            --text-warm: #e2dcd0;
            --text-muted-dark: #8a96a8;
            --text-hint-dark: #4e5a6e;
            --ink: #1a2030;
            --text-muted-light: #5a6270;
            --text-hint-light: #9aa0a8;
            --gold: #c8a870;
            --border-dark: #2e3d5c;
            --border-light: #cac4b4;
            --font-display: "Source Serif 4", "Noto Serif JP", serif;
            --font-body: "DM Sans", "Noto Serif JP", sans-serif;
            --font-mono: "IBM Plex Mono", monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: var(--stage-bg);
            color: var(--text-warm);
            font-family: var(--font-body);
        }

        body {
            background:
                linear-gradient(rgba(255, 255, 255, 0.026) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.026) 1px, transparent 1px),
                var(--stage-bg);
            background-size: 80px 80px, 80px 80px, auto;
        }

        /* Nav bar */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 16px 32px;
            background: rgba(17, 24, 43, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-dark);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--gold);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.1em;
            transition: opacity 0.2s ease;
        }

        .back-link:hover {
            opacity: 0.8;
        }

        .back-link .arrow {
            font-size: 18px;
        }

        .nav-title {
            color: var(--text-warm);
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
        }

        .nav-sep {
            color: var(--border-dark);
            font-size: 18px;
        }

        /* Article */
        .report-article {
            max-width: 860px;
            margin: 0 auto;
            padding: 56px 32px 80px;
        }

        /* Markdown rendered content */
        .md-content h1 {
            font-family: var(--font-display);
            font-size: 48px;
            font-weight: 800;
            line-height: 1.12;
            margin-bottom: 40px;
            color: var(--text-warm);
        }

        .md-content h2 {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
            margin-top: 56px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-dark);
            color: var(--text-warm);
        }

        .md-content h3 {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            line-height: 1.3;
            margin-top: 40px;
            margin-bottom: 16px;
            color: var(--gold);
        }

        .md-content p {
            font-size: 18px;
            font-weight: 500;
            line-height: 1.78;
            margin-bottom: 20px;
            color: var(--text-warm);
        }

        .md-content ul,
        .md-content ol {
            margin-bottom: 20px;
            padding-left: 28px;
        }

        .md-content li {
            position: relative;
            padding-left: 12px;
            font-size: 18px;
            font-weight: 500;
            line-height: 1.72;
            margin-bottom: 8px;
        }

        .md-content li::marker {
            color: var(--gold);
        }

        .md-content strong {
            color: var(--gold);
            font-weight: 700;
        }

        .md-content em {
            color: var(--gold);
            font-style: italic;
        }

        .md-content blockquote {
            margin: 28px 0;
            padding: 20px 28px;
            border-left: 3px solid var(--gold);
            background: rgba(200, 168, 112, 0.06);
            color: var(--text-muted-dark);
            font-style: italic;
            font-size: 17px;
            line-height: 1.7;
        }

        .md-content blockquote p {
            margin-bottom: 0;
            color: inherit;
        }

        .md-content hr {
            border: none;
            height: 1px;
            background: var(--border-dark);
            margin: 48px 0;
        }

        .md-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            font-size: 16px;
        }

        .md-content th {
            border-top: 1px solid var(--border-dark);
            border-bottom: 1px solid var(--border-dark);
            padding: 14px 12px;
            color: var(--gold);
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-align: left;
        }

        .md-content td {
            border-bottom: 1px solid rgba(46, 61, 92, 0.5);
            padding: 14px 12px;
            font-weight: 500;
            line-height: 1.5;
            vertical-align: top;
        }

        .md-content code {
            font-family: var(--font-mono);
            font-size: 0.9em;
            background: rgba(200, 168, 112, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            color: var(--gold);
        }

        /* Nested lists */
        .md-content ul ul,
        .md-content ol ol,
        .md-content ul ol,
        .md-content ol ul {
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .md-content ul ul li::marker,
        .md-content ol ul li::marker {
            color: var(--text-muted-dark);
        }

        /* Loading / Error */
        .loading,
        .error {
            text-align: center;
            padding: 120px 32px;
            color: var(--text-muted-dark);
            font-family: var(--font-mono);
            font-size: 16px;
            letter-spacing: 0.08em;
        }

        .error {
            color: #d4836a;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .top-nav {
                padding: 12px 20px;
            }

            .nav-title {
                font-size: 16px;
            }

            .report-article {
                padding: 36px 20px 60px;
            }

            .md-content h1 {
                font-size: 32px;
            }

            .md-content h2 {
                font-size: 24px;
            }

            .md-content h3 {
                font-size: 20px;
            }

            .md-content p,
            .md-content li {
                font-size: 16px;
            }

            .md-content table {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="index.html" class="back-link">
            <span class="arrow">‹</span> 一覧へ戻る
        </a>
        <span class="nav-sep">|</span>
        <span class="nav-title" id="navTitle"></span>
    </nav>

    <article class="report-article">
        <div class="md-content" id="mdContent">
            <div class="loading">読み込み中...</div>
        </div>
    </article>

    <script>
        const TICKER_NAMES = {
            "5280": "ヨシコン",
            "5956": "トーソー",
            "7871": "フクビ化学工業",
            "9872": "北恵",
        };

        const params = new URLSearchParams(window.location.search);
        const ticker = params.get("ticker");

        if (!ticker) {
            document.getElementById("mdContent").innerHTML =
                '<div class="error">ティッカーが指定されていません。</div>';
        } else {
            const name = TICKER_NAMES[ticker] || ticker;
            document.getElementById("navTitle").textContent = `${name} (${ticker})`;
            document.title = `${name} (${ticker}) — Stock Report`;

            const mdUrl = `assets/${ticker}/${ticker}.md`;

            fetch(mdUrl)
                .then((res) => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.text();
                })
                .then((md) => {
                    const html = marked.parse(md);
                    document.getElementById("mdContent").innerHTML = html;
                })
                .catch((err) => {
                    document.getElementById("mdContent").innerHTML =
                        `<div class="error">レポートの読み込みに失敗しました: ${err.message}</div>`;
                });
        }
    </script>
</body>
</html>
