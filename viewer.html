<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@500;600;700&family=IBM+Plex+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="scroll-progress" id="scrollProgress"></div>
    <nav class="top-nav">
        <a href="index.html" class="back-link">
            <span class="arrow">‹</span> 一覧へ戻る
        </a>
        <span class="nav-sep">|</span>
        <span class="nav-title" id="navTitle"></span>
    </nav>

    <article class="report-article">
        <div class="md-content" id="mdContent">
            <div class="loading">読み込み中...</div>
        </div>
    </article>

    <script>
        const TICKER_NAMES = {
            "5280": "ヨシコン",
            "5956": "トーソー",
            "7871": "フクビ化学工業",
            "9872": "北恵",
        };

        const params = new URLSearchParams(window.location.search);
        const ticker = params.get("ticker");
        const progress = document.getElementById("scrollProgress");

        const updateProgress = () => {
            const max = document.documentElement.scrollHeight - window.innerHeight;
            const ratio = max > 0 ? window.scrollY / max : 0;
            progress.style.width = `${Math.min(1, Math.max(0, ratio)) * 100}%`;
        };

        updateProgress();
        window.addEventListener("scroll", updateProgress, { passive: true });
        window.addEventListener("resize", updateProgress);

        if (!ticker) {
            document.getElementById("mdContent").innerHTML =
                '<div class="error">ティッカーが指定されていません。</div>';
        } else {
            const name = TICKER_NAMES[ticker] || ticker;
            document.getElementById("navTitle").textContent = `${name} (${ticker})`;
            document.title = `${name} (${ticker}) — Stock Report`;

            const mdUrl = `assets/${ticker}/${ticker}.md`;

            fetch(mdUrl)
                .then((res) => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.text();
                })
                .then((md) => {
                    const html = marked.parse(md);
                    document.getElementById("mdContent").innerHTML = html;
                    requestAnimationFrame(updateProgress);
                })
                .catch((err) => {
                    document.getElementById("mdContent").innerHTML =
                        `<div class="error">レポートの読み込みに失敗しました: ${err.message}</div>`;
                });
        }
    </script>
</body>
</html>
