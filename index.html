<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Report</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&family=Noto+Serif+JP:wght@500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --stage-bg: #11182b;
            --navy: #1c2644;
            --navy-alt: #232f55;
            --cream: #f0ece3;
            --cream-alt: #e6e0d4;
            --text-warm: #e2dcd0;
            --text-muted-dark: #8a96a8;
            --text-hint-dark: #4e5a6e;
            --ink: #1a2030;
            --text-muted-light: #5a6270;
            --text-hint-light: #9aa0a8;
            --gold: #c8a870;
            --border-dark: #2e3d5c;
            --border-light: #cac4b4;
            --font-display: "Source Serif 4", "Noto Serif JP", serif;
            --font-body: "DM Sans", "Noto Serif JP", sans-serif;
            --font-mono: "IBM Plex Mono", monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: var(--stage-bg);
            color: var(--text-warm);
            font-family: var(--font-body);
        }

        body {
            background:
                linear-gradient(rgba(255, 255, 255, 0.026) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.026) 1px, transparent 1px),
                var(--stage-bg);
            background-size: 80px 80px, 80px 80px, auto;
        }

        /* Header */
        .site-header {
            max-width: 960px;
            margin: 0 auto;
            padding: 80px 32px 0;
        }

        .site-header .kicker {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 28px;
            color: var(--gold);
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .site-header .kicker::before {
            content: "";
            display: block;
            width: 48px;
            height: 1px;
            background: var(--gold);
        }

        .site-header h1 {
            font-family: var(--font-display);
            font-size: 72px;
            font-weight: 700;
            line-height: 1.08;
            letter-spacing: 0;
        }

        .site-header .subtitle {
            margin-top: 24px;
            color: var(--text-muted-dark);
            font-size: 20px;
            font-weight: 500;
            line-height: 1.6;
        }

        .divider {
            max-width: 960px;
            margin: 48px auto;
            padding: 0 32px;
        }

        .divider hr {
            border: none;
            height: 1px;
            background: var(--border-dark);
        }

        /* Card list */
        .card-list {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 32px 80px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 28px;
            padding: 32px 36px;
            background: var(--navy);
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 2px;
        }

        .card-ticker {
            font-family: var(--font-mono);
            font-size: 28px;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 0.04em;
            min-width: 80px;
        }

        .card-body h2 {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
        }

        .card-body .card-desc {
            margin-top: 6px;
            color: var(--text-muted-dark);
            font-size: 15px;
            font-weight: 500;
            line-height: 1.5;
        }

        .card-arrow {
            color: var(--gold);
            font-size: 24px;
            opacity: 0.5;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .card:hover .card-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        /* Footer */
        .site-footer {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 32px 48px;
            color: var(--text-hint-dark);
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.1em;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .site-header {
                padding: 48px 20px 0;
            }

            .site-header h1 {
                font-size: 44px;
            }

            .divider {
                padding: 0 20px;
                margin: 32px auto;
            }

            .card-list {
                padding: 0 20px 60px;
            }

            .card {
                grid-template-columns: auto 1fr auto;
                gap: 16px;
                padding: 24px 20px;
            }

            .card-ticker {
                font-size: 20px;
                min-width: 60px;
            }

            .card-body h2 {
                font-size: 22px;
            }

            .site-footer {
                padding: 0 20px 32px;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="kicker">Fundamentals Research</div>
        <h1>Stock Report</h1>
        <p class="subtitle">銘柄レポート一覧</p>
    </header>

    <div class="divider"><hr></div>

    <main class="card-list" id="cardList"></main>

    <footer class="site-footer">
        <span>&copy; 2026 Stock Report</span>
    </footer>

    <script>
        const TICKERS = [
            { ticker: "5280", name: "ヨシコン", desc: "レジデンス事業・不動産開発・賃貸管理等", hasHtml: true },
            { ticker: "5956", name: "トーソー", desc: "カーテンレール・ブラインド等のインテリア製品", hasHtml: false },
            { ticker: "7871", name: "フクビ化学工業", desc: "住宅建材・CSE事業・精密事業", hasHtml: false },
            { ticker: "9872", name: "北恵", desc: "住宅資材・住宅設備の専門商社", hasHtml: false },
        ];

        const list = document.getElementById("cardList");

        TICKERS.forEach((item) => {
            const href = item.hasHtml
                ? `assets/${item.ticker}/${item.ticker}.html`
                : `viewer.html?ticker=${item.ticker}`;

            const a = document.createElement("a");
            a.className = "card";
            a.href = href;
            a.innerHTML = `
                <span class="card-ticker">${item.ticker}</span>
                <div class="card-body">
                    <h2>${item.name}</h2>
                    <p class="card-desc">${item.desc}</p>
                </div>
                <span class="card-arrow">›</span>
            `;
            list.appendChild(a);
        });
    </script>
</body>
</html>
