<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Report</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@500;600;700&family=IBM+Plex+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <div class="kicker">Portfolio Research</div>
        <h1>Stock Report</h1>
        <p class="subtitle">銘柄レポート一覧</p>
    </header>

    <div class="divider"><hr></div>

    <main class="card-list" id="cardList"></main>

    <footer class="site-footer">
        <span>&copy; 2026 Stock Report</span>
    </footer>

    <script>
        const TICKERS = [
            { ticker: "5280", name: "ヨシコン", desc: "レジデンス事業・不動産開発・賃貸管理等", hasHtml: true },
            { ticker: "5956", name: "トーソー", desc: "カーテンレール・ブラインド等のインテリア製品", hasHtml: false },
            { ticker: "7871", name: "フクビ化学工業", desc: "住宅建材・CSE事業・精密事業", hasHtml: false },
            { ticker: "9872", name: "北恵", desc: "住宅資材・住宅設備の専門商社", hasHtml: false },
        ];

        const list = document.getElementById("cardList");

        TICKERS.forEach((item) => {
            const href = item.hasHtml
                ? `assets/${item.ticker}/${item.ticker}.html`
                : `viewer.html?ticker=${item.ticker}`;

            const a = document.createElement("a");
            a.className = "card";
            a.href = href;
            a.innerHTML = `
                <span class="card-ticker">${item.ticker}</span>
                <div class="card-body">
                    <h2>${item.name}</h2>
                    <p class="card-desc">${item.desc}</p>
                </div>
                <span class="card-arrow">›</span>
            `;
            list.appendChild(a);
        });
    </script>
</body>
</html>
